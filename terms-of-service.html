    function getLanguage() {
      const params = new URLSearchParams(window.location.search);
      const rawLang = (params.get("lang") || params.get("hl") || "uk").toLowerCase();

      if (rawLang.startsWith("uk") || rawLang.startsWith("ua")) return "uk";
      if (rawLang.startsWith("ru")) return "ru";
      if (rawLang.startsWith("en")) return "en";

      return "uk";
    }

    function makeParagraph(html) {
      const p = document.createElement("p");
      p.innerHTML = html;
      return p;
    }

    function makeList(items) {
      const ul = document.createElement("ul");
      items.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = item;
        ul.appendChild(li);
      });
      return ul;
    }

    function renderBlock(parent, block, content) {
      if (block.subtitle) {
        const h3 = document.createElement("h3");
        h3.innerHTML = block.subtitle;
        parent.appendChild(h3);
      }

      if (block.paragraphs) {
        block.paragraphs.forEach((paragraph) => {
          parent.appendChild(makeParagraph(paragraph));
        });
      }

      if (block.list) {
        parent.appendChild(makeList(block.list));
      }

      if (block.afterList) {
        block.afterList.forEach((paragraph) => {
          parent.appendChild(makeParagraph(paragraph));
        });
      }

      if (block.contact) {
        parent.appendChild(makeParagraph(content.contactHtml));
      }
    }

    function updatePrivacyPolicyLinks(lang) {
      document.querySelectorAll("[data-privacy-link]").forEach((link) => {
        link.setAttribute("href", "pp.html?lang=" + encodeURIComponent(lang));
      });
    }

    const currentLang = getLanguage();
    const content = translations[currentLang];

    document.documentElement.lang = content.htmlLang;
    document.title = content.pageTitle;

    const app = document.getElementById("content");
    app.innerHTML = "";

    const h1 = document.createElement("h1");
    h1.innerHTML = content.heading;
    app.appendChild(h1);

    const updated = document.createElement("p");
    updated.className = "updated";
    updated.innerHTML = content.updated;
    app.appendChild(updated);

    content.intro.forEach((paragraph) => {
      app.appendChild(makeParagraph(paragraph));
    });

    const note = document.createElement("div");
    note.className = "note";
    note.innerHTML = content.note;
    app.appendChild(note);

    content.sections.forEach((section) => {
      const h2 = document.createElement("h2");
      h2.innerHTML = section.title;
      app.appendChild(h2);

      if (section.blocks) {
        section.blocks.forEach((block) => renderBlock(app, block, content));
      } else {
        renderBlock(app, section, content);
      }
    });

    updatePrivacyPolicyLinks(currentLang);
  </script>
</body>
</html>
