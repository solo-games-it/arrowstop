<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #111827;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 32px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 64px;
      margin: 0;
      color: #00cef2;
    }

    h2 {
      margin: 12px 0;
      font-size: 26px;
    }

    p {
      color: #6b7280;
      font-size: 16px;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 20px;
      background: #00cef2;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

</head>

<body>
  <div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    <a href="./privacy-policy.html">Open Privacy Policy</a>
  </div>
</body>
</html>
